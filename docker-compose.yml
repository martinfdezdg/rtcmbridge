version: "3.9"

services:
  nats1:
    image: nats:2.12
    container_name: nats1
    restart: unless-stopped
    command:
      - "--name=nats1"
      - "--port=4222"
      - "--http_port=8222"
      - "--cluster_name=my_cluster"
      - "--cluster=nats://0.0.0.0:6222"
      - "--routes=nats://nats2:6222"
    ports:
      - "4222:4222"
      - "8222:8222"
    expose:
      - "6222"
    networks:
      - natsnet

  nats2:
    image: nats:2.12
    container_name: nats2
    restart: unless-stopped
    command:
      - "--name=nats2"
      - "--port=4222"
      - "--http_port=8222"
      - "--cluster_name=my_cluster"
      - "--cluster=nats://0.0.0.0:6222"
      - "--routes=nats://nats1:6222"
    ports:
      - "4223:4222"
      - "8223:8222"
    expose:
      - "6222"
    networks:
      - natsnet

networks:
  natsnet:
    name: natsnet
    driver: bridge
