# nats2ntrip configuration
# Reads messages from NATS subject NTRIP.<mountpoint> and uploads them to the
# same mountpoint on the configured destination caster.

[options]
read_buffer_bytes=4096
reconnect_min_sec=2
reconnect_max_sec=32
throughput_log_kb=10

[nats_sources]
nats://127.0.0.1:4222
nats://127.0.0.1:4223

[nats_mountpoints]
ABAN3M
ACIN3M
ACNS3M
AGRD3M
AIO23M
AJAL3M
ALAC3M
ALBA3M
ALBO3M
ALC13M
ALCO3M

[ntrip_destinations]
magicgnss:gnssm 127.0.0.1:2101
