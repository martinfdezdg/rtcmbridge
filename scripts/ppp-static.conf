# RTKLIB PPP static template tuned for base-station convergence.
# Copy and customize for your receiver/antenna and products.

pos1-posmode       =7      # 7: PPP-static
pos1-frequency     =2      # dual-frequency (L1+L2)
pos1-soltype       =0      # forward
pos1-elmask        =15
pos1-snrmask_r     =off
pos1-snrmask_b     =off
pos1-dynamics      =off
pos1-tidecorr      =on

pos2-armode        =0      # PPP float
pos2-gloarmode     =0
pos2-bdsarmode     =0

out-solformat      =0      # LLH
out-outhead        =on
out-outopt         =off

stats-eratio1      =300
stats-eratio2      =300
stats-prnaccelh    =0.25
stats-prnaccelv    =0.10
stats-prnbias      =1e-4

# Receiver/antenna metadata (fill these when known)
ant1-postype       =0
ant1-pos1          =0
ant1-pos2          =0
ant1-pos3          =0
ant1-antdelu       =0
ant1-antdeln       =0
ant1-antdele       =0

# Keep file paths external: pass precise products to rnx2rtkp CLI.
